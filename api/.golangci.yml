version: "2"

linters:
  # デフォルト
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # バグ検出・正確性
    - bodyclose
    - contextcheck
    - durationcheck
    - errchkjson
    - exhaustive
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - sqlclosecheck

    # セキュリティ
    - gosec
    - bidichk

    # エラーハンドリング
    - errname
    - errorlint
    - wrapcheck
    - forcetypeassert

    # コード品質・スタイル
    - gocritic
    - revive
    - unconvert
    - unparam
    - wastedassign
    - predeclared
    - reassign
    - recvcheck
    - misspell

    # 複雑度
    - cyclop
    - funlen
    - nestif
    - gocognit

    # パフォーマンス
    - prealloc
    - perfsprint
    - copyloopvar

    # その他
    - gocheckcompilerdirectives
    - dupword
    - usestdlibvars
    - intrange
    - nolintlint

  settings:
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
      statements: 50
    nestif:
      min-complexity: 4
    gocognit:
      min-complexity: 20
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    errcheck:
      check-type-assertions: true
      check-blank: true
    exhaustive:
      default-signifies-exhaustive: true
    revive:
      rules:
        - name: package-comments
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
