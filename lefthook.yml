pre-commit:
  parallel: true
  commands:
    go-lint:
      root: "api/"
      glob: "*.go"
      run: golangci-lint run
    fe-lint:
      root: "web/"
      glob: "*.{ts,tsx}"
      run: bun run lint

pre-push:
  commands:
    go-test:
      root: "api/"
      run: go test ./...
    fe-test:
      root: "web/"
      run: bun run test
